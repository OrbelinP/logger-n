version: "2"
formatters:
  enable:
    - gofmt
    - goimports
linters:
  default: none
  enable:
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        source: "^func"
      - linters:
          - lll
        source: "//nolint.*//"
  settings:
    nolintlint:
      require-explanation: true
    revive:
      rules:
        - name: package-comments
          disabled: true
issues:
    new: true
